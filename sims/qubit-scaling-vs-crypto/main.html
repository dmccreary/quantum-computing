<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="qubit-scaling-vs-crypto">
    <title>Qubit Scaling vs. Cryptographic Requirements</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Qubit Scaling vs. Cryptographic Requirements</h1>
        <div class="chart-wrapper">
            <canvas id="qubitChart"></canvas>
        </div>
        <div class="controls">
            <div class="control-group">
                <label for="doublingSlider">Doubling time (years):</label>
                <input type="range" id="doublingSlider" min="0.5" max="3" step="0.1" value="1.5">
                <span class="value" id="doublingValue">1.5</span>
            </div>
            <div class="control-group">
                <label for="errorSlider">Error improvement factor:</label>
                <input type="range" id="errorSlider" min="1" max="100" step="1" value="1">
                <span class="value" id="errorValue">1x</span>
            </div>
            <div class="toggle-group">
                <input type="checkbox" id="pqcToggle">
                <label for="pqcToggle">Show PQC migration timeline</label>
            </div>
        </div>
        <div class="result-box" id="resultBox">
            Years until RSA-2048 threatened: <span class="threat-year" id="threatResult">—</span>
        </div>
    </div>
    <script src="qubit-scaling-vs-crypto.js"></script>
</body>
</html>
