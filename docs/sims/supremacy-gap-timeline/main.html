<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="supremacy-gap-timeline">
    <title>The Shrinking 'Supremacy' Gap</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
</head>
<body>
    <div class="chart-container">
        <canvas id="supremacyChart"></canvas>
    </div>
    <div class="controls">
        <label><input type="checkbox" id="toggleClassical" checked> Classical computation time</label>
        <label><input type="checkbox" id="toggleQuantum" checked> Sycamore quantum execution time (200s)</label>
    </div>
    <script src="supremacy-gap-timeline.js"></script>
</body>
</html>
