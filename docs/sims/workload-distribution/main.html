<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="workload-distribution">
    <title>Global Compute Workload Distribution</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Global Compute Workload Distribution</h2>
        <div class="toggle-bar">
            <button id="btn-doughnut" class="toggle-btn active" onclick="showView('doughnut')">Workload Distribution</button>
            <button id="btn-bar" class="toggle-btn" onclick="showView('bar')">QC Applicability by Category</button>
        </div>
        <div class="chart-wrapper">
            <canvas id="chart-canvas"></canvas>
        </div>
        <div id="qc-summary" class="qc-summary"></div>
        <div id="tooltip-info" class="tooltip-info"></div>
    </div>
    <script src="workload-distribution.js"></script>
</body>
</html>
